name: chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: ${{ vars.MIRROR_SSH_URL }}
  EXECUTABLES: ${{ vars.EXECUTABLES }}

jobs:
  check_compilation_and_coding_style:
    if: github.repository_owner != 'EpitechPGE1-2025'
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run coding style check
        run: banana-check-repo .
      - name: Compile repository
        run: make
        env:
          CC: epiclang
        timeout-minutes: 2
      - name: Clean repository
        run: make clean
  run_tests:
    needs: check_compilation_and_coding_style
    if: github.repository_owner != 'EpitechPGE1-2025'
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run tests
        run: make tests_run
        timeout-minutes: 2
  push_to_mirror:
    needs: run_tests
    if: github.event_name == 'push' && github.repository_owner != 'EpitechPGE1-2025'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mirroring to Epitech
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
